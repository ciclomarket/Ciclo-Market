<!DOCTYPE html>
<!-- Visual reference — open in browser to see the card design at 50% scale -->
<html>
<head>
<meta charset="utf-8">
<title>Instagram Card Preview</title>
<style>
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .scale-wrap { transform: scale(0.5); transform-origin: top center; }
</style>
</head>
<body>
<div class="scale-wrap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .card {
    position: relative;
    width: 1080px;
    height: 1350px;
    background: #0B111A;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .accent-line {
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, #00BFFF 0%, #7C3AED 60%, #00BFFF 100%);
    z-index: 20;
  }
  .top-bar {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 48px 64px 32px;
  }
  .brand-name { font-weight: 800; font-size: 36px; color: #fff; letter-spacing: -0.5px; }
  .brand-name span { color: #00BFFF; }
  .category-pill {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px; padding: 10px 28px; font-size: 26px; font-weight: 600;
    color: #CBD5E1;
  }
  .image-wrap { position: relative; flex: 1; overflow: hidden; }
  .image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .image-wrap::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
    background: linear-gradient(to bottom, transparent 0%, rgba(11,17,26,0.4) 30%, rgba(11,17,26,0.85) 65%, rgba(11,17,26,0.97) 90%, #0B111A 100%);
    pointer-events: none;
  }
  .watermark {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-25deg);
    font-size: 48px; font-weight: 900; color: rgba(255,255,255,0.25);
    white-space: nowrap; z-index: 3; letter-spacing: 2px; text-transform: uppercase;
  }
  .info-panel {
    position: absolute; bottom: 80px; left: 0; right: 0;
    padding: 0 64px 0; z-index: 5;
  }
  .title-text {
    font-family: 'Arial Black', Impact, sans-serif; font-size: 62px; font-weight: 900;
    line-height: 1.1; color: #fff; letter-spacing: -1.5px; margin-bottom: 16px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .subtitle { font-size: 30px; font-weight: 500; color: #94A3B8; margin-bottom: 36px; }
  .price-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .price-badge {
    display: inline-flex; align-items: center; background: #00BFFF; color: #0B111A;
    font-family: 'Arial Black', Impact, sans-serif; font-size: 72px; font-weight: 900;
    line-height: 1; letter-spacing: -2px; padding: 18px 44px; border-radius: 18px;
  }
  .seller-info { text-align: right; flex-shrink: 0; max-width: 340px; }
  .seller-label { font-size: 22px; color: #94A3B8; margin-bottom: 4px; }
  .seller-name { font-size: 30px; font-weight: 700; color: #fff; }
  .footer {
    padding: 28px 64px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.10);
    background: #0B111A;
  }
</style>
<div class="card">
  <div class="accent-line"></div>
  <div class="top-bar">
    <div class="brand-name">ciclo<span>market</span>.ar</div>
    <div class="category-pill">MTB</div>
  </div>
  <div class="image-wrap">
    <div style="width:100%;height:100%;background:linear-gradient(135deg,#1E3A5F,#0D1F30);display:flex;align-items:center;justify-content:center;">
      <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.7">
        <circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/>
        <path d="M8 17.5h7M15 6l2 5.5M5.5 14l3-8 2.5 8"/><circle cx="12" cy="6" r="1"/>
      </svg>
    </div>
    <div class="watermark">ciclomarket.ar</div>
  </div>
  <div class="info-panel">
    <div class="title-text">Trek Marlin 7 2023 – casi sin uso</div>
    <div class="subtitle">Trek · Marlin 7 · 2023</div>
    <div class="price-row">
      <div class="price-badge">$850.000</div>
      <div class="seller-info">
        <div class="seller-label">Vendido por</div>
        <div class="seller-name">Lucas Rodríguez</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div style="font-size:24px;color:#94A3B8;font-weight:500;">ciclomarket.ar</div>
    <div style="font-size:24px;color:#94A3B8;">Marketplace de ciclismo</div>
  </div>
</div>
</div>
</body>
</html>
